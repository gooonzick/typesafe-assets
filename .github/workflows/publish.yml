name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (latest, next, beta)"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
          - beta

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Run type checks
        run: pnpm typecheck

      - name: Publish via pnpm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r --filter=!@typesafe-assets/core publish --access public --no-git-checks --tag ${{ github.event.inputs.tag || 'latest' }}
